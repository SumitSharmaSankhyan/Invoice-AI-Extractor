<!DOCTYPE html>
<html lang="en">

<head>
  
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice AI Extractor Pro</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

<div class="logo">

Invoice AI Extractor Pro

</div>

<div class="version">

Version 1.0

</div>

</header>

<div class="main-container">

<!-- LEFT PANEL -->

<div class="left-panel">

<h2>Dashboard</h2>

<div class="card">

<h3>Total PDFs</h3>

<p id="totalFiles">0</p>

</div>

<div class="card">

<h3>Uploaded</h3>

<p id="uploadedFiles">0</p>

</div>

<div class="card">

<h3>Completed</h3>

<p id="completedFiles">0</p>

</div>

<div class="card">

<h3>Failed</h3>

<p id="failedFiles">0</p>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<h2>Upload PDFs</h2>

<div class="upload-box" id="dropZone">

<input
type="file"
id="pdfInput"
multiple
accept=".pdf"
hidden>

<p class="drag-text">

📄 Drag & Drop PDF Files Here

</p>

<button id="chooseBtn">

Choose Files

</button>

<button id="uploadBtn">

Upload PDFs

</button>

<div id="status"></div>

</div>

<h2>Selected Files</h2>

<div id="fileList">

No files selected

</div>

</div>

</div>

<script
src="{{ url_for('static', filename='js/script.js') }}">
</script>

</body>

</html>
